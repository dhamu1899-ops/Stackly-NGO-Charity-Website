<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Stackly</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="notfound">
    <div>
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>This link is not available right now. You can go back to the previous page or return to Stackly home.</p>
      <button class="btn" type="button" onclick="goBackOneStep()">Go Back</button>
      <a class="btn" href="index.html">Back to Home</a>
    </div>
  </main>
  <script>
    function goBackOneStep() {
      if (window.history.length > 1) {
        window.history.back();
        return;
      }

      window.location.href = "index.html";
    }
  </script>
</body>
</html>
